{% set version = "1.6.0" %}

package:
  name: pkgconfig
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pkgconfig/pkgconfig-{{ version }}.tar.gz
  sha256: 4a5a6631ce937fafac457104a40d558785a658bbdca5c49b6295bc3fd651907f

build:
  number: 0
  skip: True  # [py<39]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - poetry-core >=1.0.0
  run:
    - python
    - pkg-config  # [unix]
    - m2w64-pkg-config  # [win]

test:
  imports:
    - pkgconfig
    - pkgconfig.pkgconfig
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/matze/pkgconfig
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Python interface to the pkg-config command line tool
  dev_url: https://github.com/matze/pkgconfig
  doc_url: https://github.com/matze/pkgconfig/blob/master/README.rst

extra:
  recipe-maintainers:
    - jakirkham
    - lbdreyer
    - ocefpaf
